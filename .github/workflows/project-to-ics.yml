name: Project to ICS (Safe Viewer Version)

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/project-to-ics.yml"

jobs:
  build-ics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch ProjectV2 items via GraphQL (safe viewer)
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECTS_TOKEN }}  # ← PATをSecretsに追加しておく
          PROJECT_NUMBER: 1  # ← GitHub Projectの番号
        run: |
          node <<'EOF'
          const fetch = (...a)=>import('node-fetch').then(({default:f})=>f(...a));
          const token = process.env.GH_TOKEN;
          const projectNumber = Number(process.env.PROJECT_NUMBER || 1);

          const query = `
            query($number:Int!) {
              viewer {
                login
                projectV2(number:$number) {
                  id
                  title
                  items(first: 20) {
                    nodes {
                      id
                      content { __typename }
                      fieldValues(first: 10) {
                        nodes {
                          __typename
                          ... on ProjectV2ItemFieldTextValue { text field { name } }
                          ... on ProjectV2ItemFieldDateValue { date field { name } }
                          ... on ProjectV2ItemFieldSingleSelectValue { name field { name } }
                        }
                      }
                    }
                  }
                }
              }
            }`;

          (async () => {
            const res = await fetch('https://api.github.com/graphql', {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ query, variables: { number: projectNumber } })
            });
            const data = await res.json();

            if (data.errors) {
              console.error('GraphQL errors:', JSON.stringify(data.errors, null, 2));
              process.exit(1);
            }

            const proj = data?.data?.viewer?.projectV2;
            if (!proj) {
              console.error('No project returned. Check token scopes and PROJECT_NUMBER.');
              console.error(JSON.stringify(data, null, 2));
              process.exit(1);
            }

            console.log(`Viewer: ${data.data.viewer.login}`);
            console.log(`Project: ${proj.title}`);
            console.log(`Items fetched: ${proj.items.nodes.length}`);

            // ダミーICSを作成（本番はここでitems→ICS変換）
            const fs = require('fs');
            fs.mkdirSync('output', { recursive: true });
            const utc = new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
            fs.writeFileSync('output/sample.ics', `
BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Meritocracia//Project//JP
BEGIN:VEVENT
UID:sample-${utc}@meritocracia
DTSTAMP:${utc}
DTSTART:${utc}
DTEND:${utc}
SUMMARY:GraphQL Pipeline Test
DESCRIPTION:${proj.title} (${proj.items.nodes.length} items)
END:VEVENT
END:VCALENDAR
`);
          })().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Upload artifact (ICS)
        uses: actions/upload-artifact@v4
        with:
          name: project-ics
          path: output/*.ics
