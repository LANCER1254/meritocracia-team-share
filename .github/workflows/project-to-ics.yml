name: Build Project ICS and Sync to Google Calendar

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/project-to-ics.yml"

permissions:
  contents: read
  issues: read
  pull-requests: read
  projects: read

jobs:
  build-ics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install node-fetch@3

      - name: Fetch ProjectV2 items (safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_OWNER: LANCER1254   # ←自分のGitHubユーザー名 or 組織名
          PROJECT_NUMBER: 1           # ←Project (v2) の番号
        run: |
          node script/fetch-projectv2.js

      - name: Generate ICS file
        run: |
          mkdir -p output
          echo "BEGIN:VCALENDAR" > output/sample.ics
          echo "VERSION:2.0" >> output/sample.ics
          echo "PRODID:-//Meritocracia//Project//JP" >> output/sample.ics
          echo "BEGIN:VEVENT" >> output/sample.ics
          echo "UID:sample-$(date +%s)@meritocracia" >> output/sample.ics
          echo "DTSTAMP:$(date -u +%Y%m%dT%H%M%SZ)" >> output/sample.ics
          echo "DTSTART:$(date -u +%Y%m%dT090000Z)" >> output/sample.ics
          echo "DTEND:$(date -u +%Y%m%dT100000Z)" >> output/sample.ics
          echo "SUMMARY:Sample Build Event" >> output/sample.ics
          echo "DESCRIPTION:This is a dummy ICS generated by GitHub Actions." >> output/sample.ics
          echo "END:VEVENT" >> output/sample.ics
          echo "END:VCALENDAR" >> output/sample.ics
          ls -l output/

      - name: Upload ICS artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-ics
          path: output/sample.ics
