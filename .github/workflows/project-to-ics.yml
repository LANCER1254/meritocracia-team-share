name: Project to ICS (Sample)

on:
  workflow_dispatch: {}   # 手動実行用
  push:
    paths:
      - ".github/workflows/project-to-ics.yml"

jobs:
  build-ics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate dummy ICS
        run: |
          mkdir -p output
          cat > output/sample.ics <<'ICS'
          BEGIN:VCALENDAR
          VERSION:2.0
          PRODID:-//Meritocracia//Project//JP
          BEGIN:VEVENT
          UID:sample-$(date +%s)@meritocracia
          DTSTAMP:$(date -u +%Y%m%dT%H%M%SZ)
          DTSTART:$(date -u +%Y%m%dT090000Z)
          DTEND:$(date -u +%Y%m%dT100000Z)
          SUMMARY:Sample Build Event
          DESCRIPTION:This is a dummy ICS generated by GitHub Actions.
          END:VEVENT
          END:VCALENDAR
          ICS
          ls -l output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-ics
          path: output/sample.ics
