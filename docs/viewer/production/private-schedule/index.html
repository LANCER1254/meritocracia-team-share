<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERITOCRACIA OS — 作業卓</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="ps-wrap">

  <!-- ヘッダー -->
  <div class="ps-top-bar">
    <div class="ps-site-label">MERITOCRACIA — 作業卓</div>
    <div class="ps-clock-block">
      <div id="ps-clock-time">00:00:00</div>
      <div id="ps-clock-date">----/--/--</div>
    </div>
  </div>

  <!-- 週間プログレス -->
  <div class="ps-weekly-progress">
    <div class="ps-wp-header">
      <span class="ps-wp-label">WEEKLY PROGRESS</span>
      <span id="ps-wp-pct">0%</span>
    </div>
    <div class="ps-wp-bar">
      <div class="ps-wp-fill" id="ps-wp-fill"></div>
    </div>
  </div>

  <!-- 2カラム -->
  <div class="ps-main-grid">

    <!-- ポモドーロ（左カラム・完全維持） -->
    <div class="ps-card">
      <span class="ps-card-label">POMODORO TIMER</span>
      <div id="ps-pomo-mode">WORK</div>

      <div class="ps-ring-wrap">
        <svg class="ps-ring-svg" viewBox="0 0 100 100">
          <circle class="ps-ring-bg" cx="50" cy="50" r="42"/>
          <circle class="ps-ring-prog" id="ps-ring" cx="50" cy="50" r="42"
            stroke-dasharray="263.9"
            stroke-dashoffset="0"/>
        </svg>
        <div class="ps-ring-center">
          <div id="ps-pomo-timer">25:00</div>
          <div id="ps-pomo-session">SESSION 1</div>
        </div>
      </div>

      <div class="ps-pomo-btns">
        <button class="ps-pomo-btn ps-primary" id="ps-btn-start">START</button>
        <button class="ps-pomo-btn" id="ps-btn-pause">PAUSE</button>
        <button class="ps-pomo-btn" id="ps-btn-reset">RESET</button>
      </div>
    </div>

    <!-- 右カード：内部タブで週間OS / 2026 切り替え -->
    <div class="ps-card ps-schedule-card">

      <!-- 右カード内部ミニタブ -->
      <div class="ps-right-tabs">
        <button class="ps-rtab ps-rtab-active" id="ps-rtab-weekly">週間OS</button>
        <button class="ps-rtab" id="ps-rtab-calendar">2026</button>
      </div>

      <!-- ════ 週間スケジュールパネル ════ -->
      <div id="ps-weekly-panel">
        <span class="ps-card-label">WEEKLY SCHEDULE</span>

        <!-- day tabs -->
        <div class="ps-day-tabs" id="ps-day-tabs">
          <button class="ps-day-tab" data-day="MON">月</button>
          <button class="ps-day-tab" data-day="TUE">火</button>
          <button class="ps-day-tab" data-day="WED">水</button>
          <button class="ps-day-tab" data-day="THU">木</button>
          <button class="ps-day-tab" data-day="FRI">金</button>
          <button class="ps-day-tab" data-day="SAT">土</button>
          <button class="ps-day-tab" data-day="SUN">日</button>
        </div>

        <!-- NOW バナー（当日タブのみ表示） -->
        <div class="ps-now-banner" id="ps-now-banner">
          <div class="ps-now-label">NOW</div>
          <div id="ps-now-task">—</div>
          <div id="ps-now-remaining">次の予定まで —</div>
        </div>

        <!-- time-of-day ブロック -->
        <div id="ps-blocks"></div>
      </div>

      <!-- ════ 年間カレンダーパネル ════ -->
      <div id="ps-calendar-panel" class="ps-hidden">
        <span class="ps-card-label">2026 PUBLISHING CALENDAR</span>

        <!-- type凡例 -->
        <div class="ps-cal-legend">
          <span class="ps-cal-legend-item"><span class="ps-cal-legend-dot" style="background:var(--ps-amber2)"></span>RELEASE</span>
          <span class="ps-cal-legend-item"><span class="ps-cal-legend-dot" style="background:var(--ps-green2)"></span>PLOT</span>
          <span class="ps-cal-legend-item"><span class="ps-cal-legend-dot" style="background:var(--ps-purple2)"></span>REVIEW</span>
          <span class="ps-cal-legend-item"><span class="ps-cal-legend-dot" style="background:var(--ps-blue2)"></span>INFRA</span>
          <span class="ps-cal-legend-item"><span class="ps-cal-legend-dot" style="background:#e8d44d"></span>WORK</span>
          <span class="ps-cal-legend-item"><span class="ps-cal-legend-dot" style="background:#e8856a"></span>PERSONAL</span>
        </div>

        <!-- 2カラム：カレンダーグリッド + 詳細パネル -->
        <div class="ps-cal-layout">
          <div id="ps-cal-grid" class="ps-cal-grid"></div>
          <div id="ps-cal-detail" class="ps-cal-detail">
            <div class="ps-cal-detail-empty">— 日付を選択 —</div>
          </div>
        </div>
      </div>

    </div><!-- /右カード -->

  </div><!-- /ps-main-grid -->

  <div class="ps-footer-note">LOCAL — NO SERVER — NO EXTERNAL ASSETS</div>
</div>

<script src="./app.js"></script>
</body>
</html>
