<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日報Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body {
  display: flex;
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #eee;
}
#sidebar {
  width: 250px;
  background: #1a1a1a;
  padding: 10px;
  overflow-y: auto;
}
#main {
  flex: 1;
  padding: 20px;
}
.date {
  cursor: pointer;
  padding: 5px;
}
.date:hover {
  background: #333;
}
.file {
  margin-left: 10px;
  cursor: pointer;
  color: #aaa;
  padding: 4px 0;
}
.file:hover {
  color: #fff;
}
</style>
</head>
<body>

<div id="sidebar">読み込み中...</div>
<div id="main">選択してください</div>

<script>
fetch('/meritocracia-team-share/docs/viewer/index.json')
  .then(res => {
    if (!res.ok) throw new Error("index.jsonが見つからない");
    return res.json();
  })
  .then(data => buildSidebar(data.reports))
  .catch(err => {
    document.getElementById("sidebar").innerHTML = "エラー: " + err.message;
  });

function buildSidebar(reports) {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  const grouped = {};
  reports.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r.file);
  });

  Object.keys(grouped).sort().reverse().forEach(date => {
    const dateDiv = document.createElement("div");
    dateDiv.className = "date";
    dateDiv.textContent = date;
    dateDiv.onclick = () => showFiles(date, grouped[date]);
    sidebar.appendChild(dateDiv);
  });
}

function showFiles(date, files) {
  const main = document.getElementById("main");
  main.innerHTML = `<h2>${date}</h2>`;

  files.forEach(file => {
    const div = document.createElement("div");
    div.className = "file";
    div.textContent = file;
    div.onclick = () => loadMarkdown(
      `/ドキュメント/meritocracia-complete/docs/日報/${date}/${file}`
    );
    main.appendChild(div);
  });
}

function loadMarkdown(path) {
  fetch(path)
    .then(res => {
      if (!res.ok) throw new Error(`ファイル読み込み失敗: ${path}`);
      return res.text();
    })
    .then(text => {
      document.getElementById("main").innerHTML = marked.parse(text);
    })
    .catch(err => {
      document.getElementById("main").innerHTML = "エラー: " + err.message;
    });
}
</script>

</body>
</html>
