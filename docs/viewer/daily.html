<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日報Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body {
  display: flex;
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #eee;
}
#sidebar {
  width: 250px;
  background: #1a1a1a;
  padding: 10px;
  overflow-y: auto;
}
#main {
  flex: 1;
  padding: 20px;
}
.date {
  cursor: pointer;
  padding: 5px;
}
.date:hover {
  background: #333;
}
.file {
  margin-left: 10px;
  cursor: pointer;
  color: #aaa;
  padding: 4px 0;
}
.file:hover {
  color: #fff;
}
</style>
</head>
<body>

<div id="sidebar">読み込み中...</div>
<div id="main">選択してください</div>

<script>
// index.json読み込み（reports配列形式）
fetch('/meritocracia-team-share/docs/viewer/index.json')
  .then(res => {
    if (!res.ok) throw new Error("index.jsonが見つからない: " + res.status);
    return res.json();
  })
  .then(data => {
    // reports配列を日付ごとにグルーピング
    const grouped = {};
    data.reports.forEach(r => {
      if (!grouped[r.date]) grouped[r.date] = [];
      grouped[r.date].push(r.file);  // r.fileは文字列
    });
    buildSidebar(grouped);
  })
  .catch(err => {
    document.getElementById("sidebar").innerHTML = "エラー: " + err.message;
  });

// サイドバー構築
function buildSidebar(grouped) {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  // 日付降順
  Object.keys(grouped).sort().reverse().forEach(date => {
    const dateDiv = document.createElement("div");
    dateDiv.className = "date";
    dateDiv.textContent = date;
    dateDiv.onclick = () => showFiles(date, grouped[date]);
    sidebar.appendChild(dateDiv);
  });
}

// ファイル一覧表示
function showFiles(date, files) {
  const main = document.getElementById("main");
  main.innerHTML = `<h2>${date}</h2>`;

  files.forEach(filename => {
    // filenameは文字列として保証済み
    const div = document.createElement("div");
    div.className = "file";
    div.textContent = filename;
    div.onclick = () => loadMarkdown(
      `/meritocracia-team-share/docs/viewer/data/${filename}`
    );
    main.appendChild(div);
  });
}

// Markdown読み込み・表示
function loadMarkdown(path) {
  fetch(path)
    .then(res => {
      if (!res.ok) throw new Error("ファイル読み込み失敗: " + path);
      return res.text();
    })
    .then(text => {
      document.getElementById("main").innerHTML = marked.parse(text);
    })
    .catch(err => {
      document.getElementById("main").innerHTML = "エラー: " + err.message;
    });
}
</script>

</body>
</html>
