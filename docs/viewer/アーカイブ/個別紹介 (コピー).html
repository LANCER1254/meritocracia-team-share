<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTHOR PROFILE | MERITOCRACIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1614; 
            --card-bg: #241f1c;
            --gold: #b39764;
            --sage: #7a8a71;
            --text-main: #dcd6d0;
            --text-sub: #968d86;
            --border: #3d352f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            line-height: 1.8;
        }

        .profile-wrapper {
            width: 100%;
            max-width: 700px;
            padding: 80px 24px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-label {
            font-family: 'Cinzel', serif;
            color: var(--sage);
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            margin-bottom: 15px;
            display: block;
        }

        .author-title {
            font-family: 'Noto Serif JP', serif; /* 名前は読みやすく */
            font-size: 2rem;
            margin: 10px 0;
            font-weight: 500;
        }

        .author-sign {
            font-family: 'Cinzel', serif;
            font-style: italic;
            color: var(--gold);
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .content-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            position: relative;
        }

        .recommend-box {
            border-left: 2px solid var(--sage);
            padding-left: 25px;
            margin: 20px 0;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .recommend-box::before {
            content: "Recommendation";
            font-family: 'Cinzel', serif;
            display: block;
            font-size: 0.6rem;
            color: var(--sage);
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        .cta-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 60px;
        }

        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
            border-radius: 28px; /* 丸いボタン */
            border: 1px solid var(--border);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
            background: rgba(255,255,255,0.03);
        }

        .cta-button:hover {
            border-color: var(--sage);
            background: var(--sage);
            color: #fff;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 80px;
            color: var(--text-sub);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--sage);
        }

        @media (max-width: 500px) {
            .cta-group { grid-template-columns: 1fr; }
            .content-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="profile-wrapper">
        <div class="hero-section">
            <span class="section-label">GUEST PROFILE</span>
            <h1 class="author-title" id="disp-name">作者名読み込み中...</h1>
            <span class="author-sign" id="disp-catchphrase">Catchphrase</span>
        </div>

        <div class="content-card">
            <span class="section-label">INTRODUCTION</span>
            <p id="disp-description" style="margin-top:20px;">作品紹介テキストが入ります。</p>
        </div>

        <div class="content-card">
            <div class="recommend-box">
                「ここがこの作品の素晴らしいポイントです。メリトクラシアの読者にもぜひ触れてほしい世界観です」
            </div>
        </div>

        <div class="cta-group">
            <a href="#" class="cta-button" id="link-narou">小説家になろう</a>
            <a href="#" class="cta-button" id="link-kakuyomu">カクヨム</a>
        </div>

        <a href="index.html" class="back-link">CLOSE ARCHIVE</a>
    </div>

    <script>
        const dummyData = {
            "sample_author": {
                "name": "霧嶋 凪",
                "catchphrase": "Nagi Kirishima",
                "description": "緻密な設定と心理描写で描かれる異世界戦記。国家の在り方を問うその姿勢は、メリトクラシアの世界観とも深く共鳴します。",
                "narou": "#",
                "kakuyomu": "#"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const authorId = params.get('id');

        if(authorId && dummyData[authorId]) {
            const data = dummyData[authorId];
            document.getElementById('disp-name').textContent = data.name;
            document.getElementById('disp-catchphrase').textContent = data.catchphrase;
            document.getElementById('disp-description').textContent = data.description;
            document.getElementById('link-narou').href = data.narou;
            document.getElementById('link-kakuyomu').href = data.kakuyomu;
        }
    </script>
</body>
</html>
