<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTHORS PORTAL | MERITOCRACIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --gold: #c5a059;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --border: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        .portal-label {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 0.3em;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
        }

        /* Author Grid */
        .author-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .author-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .author-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .author-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--gold);
            opacity: 0;
            transition: 0.3s;
        }

        .author-card:hover::before { opacity: 1; }

        .author-name {
            display: block;
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .author-tagline {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            display: block;
        }

        .permission-date {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 2px 8px;
            display: inline-block;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="portal-label">SUPPORTED AUTHORS</span>
            <h1>共鳴する物語たち</h1>
            <p style="color:var(--text-sub); margin-top:20px;">能力主義国家の地平で交差する、優れた作家陣の紹介</p>
        </header>

        <div class="author-grid">
            <a href="profile.html?id=sample_author" class="author-card">
                <span class="author-name">作者名サンプル</span>
                <span class="author-tagline">この物語は、静かなる革命を綴る。</span>
                <div class="permission-date">EST. 2026.04.07</div>
            </a>
            </div>
    </div>
</body>
</html>
