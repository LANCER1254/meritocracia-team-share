<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lancer’s Reading Blend | MERITOCRACIA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Noto+Serif+JP:wght@300;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LANCER'S READING BLEND — PORTAL DESIGN
   コンセプト: 琥珀色の読書ラウンジ × ティーラベル
   ============================================================ */

:root {
  /* 琥珀・羊皮紙系（iris.htmlより継承） */
  --amber-dark:   #2a1a0e;
  --amber-mid:    #3d2410;
  --amber-light:  #a0521a;
  --parchment:    #FFF8E7;
  --parchment-d:  #f5e8c8;
  
  /* アクセント：ライティング・ゴールド */
  --blend-gold:   #c4803a;
  --text-main:    #3d2410;
  --text-sub:     #6d4c31;
}

body {
  background-color: var(--parchment);
  color: var(--text-main);
  font-family: 'Noto Serif JP', serif;
  margin: 0;
  transition: background-color 0.6s ease, color 0.6s ease;
}

/* Night Mode (iris.html 継承) */
body.night-mode {
  background-color: var(--amber-dark);
  color: var(--parchment);
  --text-main: var(--parchment);
  --text-sub: var(--parchment-d);
}

/* ============================================================
   HEADER: 紅茶ラベル風
   ============================================================ */
.blend-header {
  padding: 80px 20px;
  text-align: center;
  border-bottom: 2px double var(--amber-mid);
  background: linear-gradient(to bottom, var(--parchment-d), var(--parchment));
}

body.night-mode .blend-header {
  background: linear-gradient(to bottom, #1a1009, var(--amber-dark));
  border-bottom-color: var(--blend-gold);
}

.label-brand {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 1.2rem;
  letter-spacing: 0.2em;
  color: var(--amber-light);
}

.label-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.5rem;
  font-weight: 300;
  margin: 10px 0;
  letter-spacing: 0.05em;
}

.label-subtitle {
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  opacity: 0.8;
}

/* ============================================================
   AUTHOR CARDS: 柔らかいカードUI
   ============================================================ */
.lounge-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 60px 20px;
}

.blend-card {
  background: white;
  border-radius: 24px;
  padding: 45px;
  margin-bottom: 50px;
  box-shadow: 0 10px 30px rgba(61,36,16,0.05);
  border: 1px solid rgba(160,82,26,0.1);
  position: relative;
  overflow: hidden;
  transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

body.night-mode .blend-card {
  background: var(--amber-mid);
  border-color: rgba(196,128,58,0.2);
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

/* 湯気・余韻エフェクト */
.blend-card::after {
  content: "";
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(196,128,58,0.05) 0%, transparent 70%);
  opacity: 0;
  transition: 0.8s;
  pointer-events: none;
}

.blend-card:hover {
  transform: translateY(-5px);
  border-color: var(--blend-gold);
}

.blend-card:hover::after {
  opacity: 1;
}

.author-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 30px;
}

.author-avatar {
  width: 70px; height: 70px;
  border-radius: 50%;
  border: 2px solid var(--blend-gold);
  padding: 3px;
}

.blend-info h2 {
  margin: 0;
  font-size: 1.6rem;
  font-weight: 500;
}

.blend-tag {
  font-family: 'Cormorant Garamond', serif;
  color: var(--amber-light);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.reading-notes {
  border-left: 2px solid var(--blend-gold);
  padding-left: 25px;
  margin: 30px 0;
  font-style: italic;
  font-size: 1.05rem;
  line-height: 1.9;
}

/* ============================================================
   CTA & LINKS
   ============================================================ */
.cta-group {
  display: flex;
  gap: 15px;
  margin-top: 35px;
}

.btn-blend {
  flex: 1;
  text-align: center;
  padding: 14px;
  border-radius: 30px;
  text-decoration: none;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  transition: 0.3s;
  border: 1px solid var(--amber-mid);
}

.btn-blend.primary {
  background: var(--amber-mid);
  color: var(--parchment);
}

.btn-blend.secondary {
  color: var(--amber-mid);
}

body.night-mode .btn-blend.primary { background: var(--blend-gold); border-color: var(--blend-gold); }
body.night-mode .btn-blend.secondary { color: var(--parchment); border-color: var(--parchment); }

/* Mode Toggle (iris.html 継承) */
.mode-toggle {
  position: fixed;
  bottom: 30px; right: 30px;
  background: var(--amber-mid);
  color: white;
  border: none;
  width: 50px; height: 50px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 100;
  font-family: 'Cormorant Garamond', serif;
}

</style>
</head>
<body>

<header class="blend-header">
  <span class="label-brand">Lancer’s Reading Blend</span>
  <h1 class="label-title">今夜、おすすめしたい物語</h1>
  <p class="label-subtitle">SELECTORS LOUNGE</p>
</header>

<main class="lounge-container">

  <article class="blend-card">
    <div class="author-meta">
      <div class="author-avatar">
        <div style="background:#eee; width:100%; height:100%; border-radius:50%;"></div>
      </div>
      <div class="blend-info">
        <span class="blend-tag">Master Blender</span>
        <h2>作者名サンプル</h2>
      </div>
    </div>

    <p class="author-bio">
      緻密な世界観と、心に深く突き刺さる心理描写。
      能力主義の地平で出会った、共鳴する魂の物語を紡ぐ書き手。
    </p>

    <div class="reading-notes">
      「この物語が持つ特有の『苦み』と『救い』は、
      静かな夜に一杯の紅茶を嗜むような、贅沢な時間を与えてくれます」
    </div>

    <div class="cta-group">
      <a href="#" class="btn-blend primary">小説家になろうで読む</a>
      <a href="#" class="btn-blend secondary">カクヨムへ</a>
    </div>
  </article>

</main>

<button class="mode-toggle" id="toggleBtn">Night</button>

<script>
  const btn = document.getElementById('toggleBtn');
  btn.addEventListener('click', () => {
    document.body.classList.toggle('night-mode');
    btn.textContent = document.body.classList.contains('night-mode') ? 'Day' : 'Night';
  });
</script>

</body>
</html>
