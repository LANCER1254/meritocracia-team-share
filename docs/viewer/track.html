<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker | MERITOCRACIA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07090f;
  --bg2:     #0c0f1a;
  --bg3:     #111520;
  --bg4:     #161b28;
  --gold:    #c8a45a;
  --gold2:   #e5c97e;
  --green:   #2ecc71;
  --green2:  #27ae60;
  --blue:    #3498db;
  --orange:  #e67e22;
  --gray:    #555e6e;
  --text:    #c8d0dc;
  --text2:   #6a7888;
  --text3:   #3a4858;
  --border:  rgba(200,164,90,0.1);
  --border2: rgba(200,164,90,0.2);

  --doing-bg:    rgba(52,152,219,0.12);
  --doing-color: #5aabdb;
  --todo-bg:     rgba(100,110,130,0.12);
  --todo-color:  #8899aa;
  --done-bg:     rgba(46,204,113,0.12);
  --done-color:  #2ecc71;
  --hold-bg:     rgba(230,126,34,0.12);
  --hold-color:  #e67e22;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 5% 5%, rgba(200,164,90,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 95% 95%, rgba(52,152,219,0.04) 0%, transparent 55%),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(200,164,90,0.007) 80px, rgba(200,164,90,0.007) 81px),
    repeating-linear-gradient(0deg,  transparent, transparent 80px, rgba(200,164,90,0.007) 80px, rgba(200,164,90,0.007) 81px);
  pointer-events: none; z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 32px 80px; }

/* ヘッダー */
header {
  padding: 48px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left .label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gold);
  opacity: 0.6;
  margin-bottom: 8px;
}

.header-left h1 {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 4px;
  color: var(--text);
}

.header-right {
  text-align: right;
}

.week-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 2px;
}

/* サマリーカード */
.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 40px;
}

.sum-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border);
  padding: 16px 20px;
  transition: border-top-color 0.2s;
}

.sum-card:hover { border-top-color: var(--gold); }

.sum-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 300;
  margin-bottom: 4px;
}

.sum-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text2);
}

.sum-card.all   .sum-num { color: var(--gold); }
.sum-card.doing .sum-num { color: var(--doing-color); }
.sum-card.done  .sum-num { color: var(--done-color); }
.sum-card.todo  .sum-num { color: var(--todo-color); }

/* 進捗バー */
.progress-wrap {
  margin-bottom: 40px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-title {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text2);
}

.progress-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--gold);
}

.progress-bar {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(to right, var(--gold), var(--gold2));
  border-radius: 2px;
  transition: width 0.8s ease;
}

/* カテゴリフィルター */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: 'Noto Serif JP', serif;
  font-size: 10px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}

.filter-btn:hover, .filter-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(200,164,90,0.05);
}

/* タスクリスト */
.task-section {
  margin-bottom: 40px;
}

.task-section-title {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text3);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.task-grid {
  display: grid;
  gap: 8px;
}

.task-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.2s;
  cursor: default;
}

.task-card:hover {
  background: var(--bg3);
  border-color: rgba(200,164,90,0.2);
}

.task-card[data-status="doing"] { border-left-color: var(--doing-color); }
.task-card[data-status="done"]  { border-left-color: var(--done-color); }
.task-card[data-status="todo"]  { border-left-color: var(--gray); }
.task-card[data-status="hold"]  { border-left-color: var(--hold-color); }

.task-status {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.status-doing { background: var(--doing-bg); color: var(--doing-color); }
.status-done  { background: var(--done-bg);  color: var(--done-color); }
.status-todo  { background: var(--todo-bg);  color: var(--todo-color); }
.status-hold  { background: var(--hold-bg);  color: var(--hold-color); }

.task-name {
  font-size: 14px;
  color: var(--text);
  flex: 1;
  letter-spacing: 1px;
}

.task-card[data-status="done"] .task-name {
  color: var(--text2);
  text-decoration: line-through;
  text-decoration-color: var(--text3);
}

.task-category {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  white-space: nowrap;
}

.task-day {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
}

/* 優先度ドット */
.priority {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.priority-S { background: #e74c3c; }
.priority-A { background: var(--orange); }
.priority-B { background: var(--blue); }
.priority-C { background: var(--gray); }

/* 空状態 */
.empty {
  text-align: center;
  padding: 48px;
  color: var(--text3);
  font-size: 12px;
  letter-spacing: 2px;
}

/* 戻るリンク */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text2);
  text-decoration: none;
  margin-bottom: 32px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--gold); }

/* エラー */
.error {
  background: rgba(231,76,60,0.1);
  border: 1px solid rgba(231,76,60,0.3);
  padding: 16px 20px;
  font-size: 13px;
  color: #e74c3c;
  margin: 20px 0;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

@media (max-width: 640px) {
  .summary { grid-template-columns: repeat(2, 1fr); }
  .task-category, .task-day { display: none; }
  .wrap { padding: 0 16px 60px; }
  header { padding: 32px 0 24px; }
}
</style>
</head>
<body>
<div class="wrap">

  <a class="back-link" href="../index.html">← HUB</a>

  <header>
    <div class="header-left">
      <div class="label">MERITOCRACIA — PROJECT TRACKER</div>
      <h1>WEEKLY TASKS</h1>
    </div>
    <div class="header-right">
      <div class="week-label" id="week-label">—</div>
    </div>
  </header>

  <!-- サマリー -->
  <div class="summary">
    <div class="sum-card all">
      <div class="sum-num" id="cnt-all">0</div>
      <div class="sum-label">TOTAL</div>
    </div>
    <div class="sum-card doing">
      <div class="sum-num" id="cnt-doing">0</div>
      <div class="sum-label">IN PROGRESS</div>
    </div>
    <div class="sum-card done">
      <div class="sum-num" id="cnt-done">0</div>
      <div class="sum-label">DONE</div>
    </div>
    <div class="sum-card todo">
      <div class="sum-num" id="cnt-todo">0</div>
      <div class="sum-label">TODO</div>
    </div>
  </div>

  <!-- 進捗バー -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-title">WEEKLY PROGRESS</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- フィルター -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="doing">進行中</button>
    <button class="filter-btn" data-filter="todo">未着手</button>
    <button class="filter-btn" data-filter="done">完了</button>
    <button class="filter-btn" data-filter="hold">保留</button>
  </div>

  <!-- タスクリスト -->
  <div id="task-container"></div>

</div>

<script>
const STATUS_LABEL = { doing:'IN PROGRESS', done:'DONE', todo:'TODO', hold:'HOLD' };
const STATUS_CLASS = { doing:'status-doing', done:'status-done', todo:'status-todo', hold:'status-hold' };
const PRIORITY_ORDER = { S:0, A:1, B:2, C:3 };

let allTasks = [];
let currentFilter = 'all';

fetch('./track/data.json')
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    document.getElementById('week-label').textContent = 'WEEK ' + data.week;
    allTasks = data.tasks || [];
    render();
  })
  .catch(err => {
    document.getElementById('task-container').innerHTML =
      `<div class="error">data.json の読み込みに失敗しました（${err.message}）</div>`;
  });

function render() {
  const filtered = currentFilter === 'all'
    ? allTasks
    : allTasks.filter(t => t.status === currentFilter);

  // サマリー更新
  const counts = { doing:0, done:0, todo:0, hold:0 };
  allTasks.forEach(t => { if(counts[t.status] !== undefined) counts[t.status]++; });
  document.getElementById('cnt-all').textContent   = allTasks.length;
  document.getElementById('cnt-doing').textContent = counts.doing;
  document.getElementById('cnt-done').textContent  = counts.done;
  document.getElementById('cnt-todo').textContent  = counts.todo;

  // 進捗バー
  const pct = allTasks.length ? Math.round((counts.done / allTasks.length) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // カテゴリ別グループ化
  const groups = {};
  filtered.forEach(t => {
    const cat = t.category || '未分類';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  const container = document.getElementById('task-container');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">該当するタスクがありません</div>';
    return;
  }

  container.innerHTML = Object.entries(groups).map(([cat, tasks]) => {
    // 優先度でソート
    tasks.sort((a,b) => (PRIORITY_ORDER[a.priority]??9) - (PRIORITY_ORDER[b.priority]??9));

    const cards = tasks.map(t => `
      <div class="task-card" data-status="${t.status}">
        <div class="priority priority-${t.priority || 'C'}"></div>
        <span class="task-status ${STATUS_CLASS[t.status] || 'status-todo'}">
          ${STATUS_LABEL[t.status] || t.status}
        </span>
        <span class="task-name">${t.name}</span>
        ${t.day ? `<span class="task-day">Day${t.day}</span>` : ''}
        <span class="task-category">${t.category || ''}</span>
      </div>
    `).join('');

    return `
      <div class="task-section">
        <div class="task-section-title">${cat}</div>
        <div class="task-grid">${cards}</div>
      </div>
    `;
  }).join('');
}

// フィルター
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});
</script>
</body>
</html>
