<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Mythology | Meritocracia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #e5e7eb;
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    h1, h2, h3 {
      color: #60a5fa;
    }
    .section {
      margin-bottom: 40px;
      padding: 20px;
      border-left: 3px solid #60a5fa;
      background: #1a1d24;
    }
    .node {
      margin-left: 20px;
    }
    .arrow {
      color: #9ca3af;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h1>🌌 Mythology Tree</h1>
<p>メリトクラシア 神話構造（v1.0）</p>

<div class="section">
  <h2>■ 原初層</h2>
  <div class="node">カオス：絶対的選別存在</div>
</div>

<div class="section">
  <h2>■ 天界層</h2>
  <div class="node">メタトロン：選別・最適化</div>
  <div class="node">ルシファー：反逆・強者選別</div>
</div>

<div class="section">
  <h2>■ 分岐点</h2>
  <div class="node">メタトロン崩壊</div>
  <div class="node">原因：正しさが人を救わない</div>
</div>

<div class="section">
  <h2>■ 分裂構造</h2>
  <div class="node">① 本体：封印</div>
  <div class="node">② 機能：心音システム</div>
  <div class="node">③ 意志：ジェイドへ転生</div>
</div>

<div class="section">
  <h2>■ 堕天使層</h2>
  <div class="node">ベルフェゴール：観測者</div>
</div>

<div class="section">
  <h2>■ 人間世界</h2>
  <div class="node">メリトクラシア：能力選別国家</div>
  <div class="node">グローリアテスト：地上の選別装置</div>
</div>

<div class="section">
  <h2>■ 主人公</h2>
  <div class="node">ジェイド：選別を拒否する存在</div>
</div>

<div class="section">
  <h2>■ 最終構造</h2>
  <div class="node">カオス：信仰選別</div>
  <div class="node">ルシファー：強者選別</div>
  <div class="node">国家：能力選別</div>
  <div class="arrow">↓</div>
  <div class="node">ジェイド：選別の拒否</div>
</div>

</body>
</html>
