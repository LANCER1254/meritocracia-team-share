<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nation Markdown Viewer</title>
  <link rel="stylesheet" href="../nation.css">
  <style>
    .viewer {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 32px;
      line-height: 1.9;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="tag">MARKDOWN VIEWER</p>
      <h1 id="title">読み込み中...</h1>
    </header>

    <article id="content" class="viewer"></article>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const title = document.getElementById("title");
    const content = document.getElementById("content");

    if (!file) {
      title.textContent = "ファイル未指定";
      content.textContent = "URLに ?file=xxx.md を指定してください。";
    } else {
      title.textContent = decodeURIComponent(file);

      fetch(file)
        .then(res => res.text())
        .then(text => {
          content.textContent = text;
        })
        .catch(err => {
          content.textContent = "読み込み失敗: " + err;
        });
    }
  </script>
</body>
</html>
