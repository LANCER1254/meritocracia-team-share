① 旧・連邦制時代の国家名（採用）
✅ アルビオン連邦（Albion Federation）

メリトクラシアが独立する前の大枠国家

複数の王国・地域から成る連邦制

世襲制・血統主義が主流

現在も「旧アルビオン連邦圏」として歴史的呼称が残る

📌
思想的旧世界の象徴

② 隣国A（テロ黒幕国・採用）
✅ ヴァルディア王国（Kingdom of Valdia）

アルビオン連邦から分離・残存した世襲制国家

貴族主義・保守思想が強い

国家プライドが高く、体制防衛意識が強い

物語上の役割

テロリスト7名の出身国

貴族が主犯という設定と高い親和性

人名 カイ・ヴァルディス との語感的整合性あり

📌
「制度に敗れた側の貴族国家」

③ 隣国B（仮・未採用だが有力）
⏸ エルドリッジ王国（Eldridge Kingdom）

非常に古い貴族家系を持つ国家

没落・停滞・格式の残骸といった印象

メリトクラシアの実力主義との対比が鮮明

📌
将来的に

没落貴族キャラ

保守派思想の温床
として使いやすい

④ 隣国C（仮・連邦残存色が強い）
⏸ サウスアルビオン王国（South Albion）

元アルビオン連邦の一部であることが一目で分かる

独立後も歴史的因縁を引きずる立場

地理・外交説明がしやすい

📌
「過去に縛られた国家」の象徴として便利

