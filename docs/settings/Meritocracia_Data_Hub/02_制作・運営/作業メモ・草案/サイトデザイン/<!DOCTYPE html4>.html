<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FRAN DESIGN BASE - LIGHT MODE</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; gap: 40px; padding: 40px; background: #f0f0f0; font-family: sans-serif; }
        .base { width: 100%; max-width: 800px; padding: 40px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 2rem; letter-spacing: 0.2em; margin-bottom: 20px; }
        .tag { font-size: 0.8rem; letter-spacing: 0.3em; margin-bottom: 10px; font-weight: bold; }
        .box { padding: 20px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.05); line-height: 1.8; }

        /* パターン1: ピンク */
        .pink-base { background: #fffcfd; color: #665c5e; border-color: #fce4ec; }
        .pink-base h1 { color: #d81b60; opacity: 0.4; }
        .pink-base .tag { color: #f06292; }
        .pink-base .box { background: #fff5f8; border-left: 4px solid #f8bbd0; }

        /* パターン2: ブルー */
        .blue-base { background: #fafdff; color: #5c6266; border-color: #e1f5fe; }
        .blue-base h1 { color: #0288d1; opacity: 0.4; }
        .blue-base .tag { color: #4fc3f7; }
        .blue-base .box { background: #f1f9ff; border-left: 4px solid #b3e5fc; }

        /* パターン3: グレー（髪色） */
        .grey-base { background: #fafafa; color: #616161; border-color: #eeeeee; }
        .grey-base h1 { color: #212121; opacity: 0.3; }
        .grey-base .tag { color: #9e9e9e; }
        .grey-base .box { background: #f5f5f5; border-left: 4px solid #bdbdbd; }
    </style>
</head>
<body>

    <div class="base pink-base">
        <div class="tag">07 / THE CONSUMED (PINK)</div>
        <h1>FRAN</h1>
        <div class="box">
            「削られ続けても、まだ消えていない感情の残骸」<br>
            淡いピンクの背景。彼女の心の奥にわずかに残った「痛み」や「震え」を表現。
        </div>
    </div>

    <div class="base blue-base">
        <div class="tag">07 / THE CONSUMED (BLUE)</div>
        <h1>FRAN</h1>
        <div class="box">
            「反応を止めてしまった空虚な静寂」<br>
            白に近い水色の背景。自発性を失い、ただそこに「居るだけ」の透明な存在感を表現。
        </div>
    </div>

    <div class="base grey-base">
        <div class="tag">07 / THE CONSUMED (GREY)</div>
        <h1>FRAN</h1>
        <div class="box">
            「退色し、霧に溶けていく存在」<br>
            明るいアッシュグレーの背景。本編描写の『灰色の扉』や、彼女自身の髪色と整合させた消耗の色。
        </div>
    </div>

</body>
</html>
