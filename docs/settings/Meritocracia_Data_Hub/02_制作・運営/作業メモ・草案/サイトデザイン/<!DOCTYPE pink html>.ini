<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHARACTER PROFILE | FRAN</title>

<!-- フォント（統一） -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    /* 🌸 儚さ維持しつつ視認性UP */
    --bg-base: #f4c6d0;
    --section-bg: rgba(255, 255, 255, 0.45);
    --border-primary: rgba(255, 255, 255, 0.5);
    --border-accent: #ffffff;

    --text-main: #3a2e2e;
    --text-sub: #6b4b4b;

    --header-text: #ffffff;
    --header-bg: #8e8e8e;

    --shadow: rgba(0, 0, 0, 0.08);
}

body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: 'Noto Serif JP', serif;
    line-height: 1.8;
    margin: 0;
    padding: 40px 20px;
}

.container {
    max-width: 850px;
    margin: 0 auto;
    border: 1px solid var(--border-primary);
    padding: 40px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 6px;
    box-shadow: 0 10px 30px var(--shadow);
}

/* ヘッダー */
header {
    background-color: var(--header-bg);
    border-bottom: 2px solid var(--border-accent);
    margin: -40px -40px 30px -40px;
    padding: 30px 40px;
}

.char-tag {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.7);
}

h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.8rem;
    letter-spacing: 0.2em;
    margin: 5px 0;
    color: var(--header-text);
}

.catchphrase {
    font-size: 0.95rem;
    color: #fce4ec;
    font-style: italic;
}

/* レイアウト */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
}

@media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
}

/* セクション */
h2 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    border-bottom: 1px solid var(--border-primary);
    padding-bottom: 8px;
    margin-bottom: 20px;
}

.section-box {
    background: var(--section-bg);
    padding: 25px;
    border-radius: 4px;
    margin-bottom: 30px;
    border: 1px solid var(--border-primary);
}

/* テーブル */
.profile-table {
    width: 100%;
    border-collapse: collapse;
}

.profile-table th,
.profile-table td {
    padding: 12px 10px;
    border-bottom: 1px solid var(--border-primary);
}

.profile-table th {
    color: var(--text-sub);
    width: 35%;
}

/* タグ */
.tag {
    display: inline-block;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--border-accent);
    padding: 4px 10px;
    margin: 5px;
    font-size: 0.75rem;
    border-radius: 3px;
}

/* テキスト */
.memo {
    font-size: 0.9rem;
    line-height: 1.8;
}

/* フッター */
.footer-note {
    margin-top: 50px;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.3em;
}
</style>
</head>

<body>

<div class="container">

<header>
<p class="char-tag">CHARACTER 07 / THE CONSUMED</p>
<h1>FRAN</h1>
<p class="catchphrase">「削られ続けても、まだ消えていない感情の残骸」</p>
</header>

<div class="grid">

<!-- 左 -->
<div>

<section>
<h2>Basic Profile</h2>
<table class="profile-table">
<tr><th>Role</th><td>消耗した感情（被害の象徴）</td></tr>
<tr><th>Action</th><td>受動・追従・非判断</td></tr>
<tr><th>Condition</th><td>慣れによる無反応状態</td></tr>
<tr><th>Core</th><td>臆病な本質と感情の残骸</td></tr>
</table>

<div>
<span class="tag">Consumed</span>
<span class="tag">Passive</span>
<span class="tag">Weakness-Remains</span>
</div>

</section>

</div>

<!-- 右 -->
<div>

<section class="section-box">
<h2>Definition</h2>
<p class="memo">
強いわけでも壊れているわけでもない。<br>
ただ、過酷な環境に削られ、反応することを止めてしまった少女。<br><br>
それは恐怖ではなく「慣れ」であり、制度に摩耗しきった個人の象徴である。
</p>
</section>

<section class="section-box">
<h2>Relation</h2>
<p class="memo">
アイリス：同じ使用人階層。先に救われた存在。<br>
ジェイド：選ぶ側の人間。依存対象。<br>
キール：初めて自分を救った存在（無意識）。<br>
</p>
</section>

<section class="section-box">
<h2>Note</h2>
<p class="memo">
強くなるキャラではない。<br>
奪われた選択を取り戻し、「本来の自分に戻る」過程を描く。
</p>
</section>

</div>

</div>

<footer>
<p class="footer-note">Phase 01 Design Locked | Status: Consumed</p>
</footer>

</div>

</body>
</html>